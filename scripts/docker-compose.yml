version: "3.8"

services:
  backend:
    build:
      context: ../backend
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    environment:
      - PORT=5001
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-me}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///classqr.db}
      - QR_FRONTEND_ORIGIN=${QR_FRONTEND_ORIGIN:-}
      - CORS_ALLOW_LAN=${CORS_ALLOW_LAN:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - backend_data:/app/instance

  frontend:
    image: nginx:alpine
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro

volumes:
  backend_data:

